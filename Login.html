<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in food order - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            background-image: url('https://i.pinimg.com/564x/07/ca/77/07ca77922ce13ceba74019fde9d1bca4.jpg');
			 background-size: cover;
            background-position: center;
        }

        #login-container {
            max-width: 400px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        #login-container img {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #4caf50;
            

color: #fff;
            padding: 10px 35px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
                  /* Button styles */
        .cart-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="login-container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOWXwl_HONi9kFuA9BtSCTEQqW-Bi_b7RKaQ&usqp=CAUZ" alt="Store Image">
        <h2>Login food order</h2>
        <form action="/your-login-endpoint" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>


    <!-- Return to Main Page Button -->
    <div style="text-align: center; margin-top: 20px;">
        <a href="Home.html" class="cart-button">
            Login
        </a>
        <button type="submit" class="registration-button">chack</button>

        </div>
            
            <img src="https://static.vecteezy.com/system/resources/thumbnails/003/541/644/small/icon-social-media-design-set-free-vector.jpg" alt="Store Image">
        
        </form>
    </div>
</body>
</html>
